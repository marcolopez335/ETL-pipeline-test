database:
  name: "default"
  use_stored_credentials: true

paths:
  sql_dir: "sql"
  cache_dir: "cache"
  output_dir: "output"
  log_dir: "logs"
  backup_dir: "backups"

backup:
  enabled: true
  max_backups: 5

cache:
  backup_enabled: true
  max_cache_backups: 3
  min_retention_pct: 0.98

snapshots:
  day_of_week: 0        # 0=Monday, 1=Tuesday, ..., 6=Sunday
  lookback_weeks: 4

stories:
  table_id: "AMMM.Stories.v1.py"
  hyper_filename: "STORIES.hyper"
  cache_filename: "stories_history_cache.parquet"
  key_column: "STORY_NUMBER"
  sql_history_full: "Ahist.sql"
  sql_history_recent: "Ahist_recent.sql"
  sql_summary: "Asum.sql"
  sql_epics: "EsumEhist.sql"

epics:
  table_id: "AMMM.Epics.v1.py"
  acrp_table_id: "AMMM.Epics_ACRP.v1.py"
  hyper_filename: "EPICS.hyper"
  acrp_hyper_filename: "EPICS_ACRP.hyper"
  cache_filename: "epics_history_cache.parquet"
  key_column: "EPIC_KEY"
  sql_history_full: "EpicHistory.sql"
  sql_history_recent: "EpicHistory_recent.sql"
  sql_summary: "EpicSummary.sql"

tableau:
  tst:
    server_url: ""
    site_id: ""
    project_name: ""
    overwrite: true
  prd:
    server_url: ""
    site_id: ""
    project_name: ""
    overwrite: true
